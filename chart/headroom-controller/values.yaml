# Default values for headroom-controller
image: ghcr.io/openfaasltd/headroom-controller:v0.0.3

imagePullPolicy: IfNotPresent

replicas: 1

rbac:
  create: true
  # Role can be either "Role" or "ClusterRole"
  role: ClusterRole

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

metrics:
  enabled: false

leaderElection:
  enabled: true
  namespace: "default"

logging:
  level: info
